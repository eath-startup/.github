name: Bug report
description: Signaler un bug dans l'application
title: "[BUG] "
labels: ["bug"]

body:

- type: textarea
  id: description
  attributes:
    label: Description
    description: Décrire clairement le problème
  validations:
    required: true

- type: textarea
  id: steps
  attributes:
    label: Steps to reproduce
    description: Étapes pour reproduire le bug
  validations:
    required: true

- type: textarea
  id: expected
  attributes:
    label: Expected behavior
    description: Comportement attendu
  validations:
    required: true

- type: textarea
  id: environment
  attributes:
    label: Environment
    description: plateforme, device, version
